<!DOCTYPE html>
<html lang="en">

<body>
    <div class="conversation">
        <!-- User Message -->
        <div class="user-query-container">
            <div class="sr-only">You said:</div>
            <div class="query-text">What is the capital of France?</div>
        </div>

        <!-- Assistant Message -->
        <div class="model-response">
            <div class="response-text">
                <p>The capital of France is Paris.</p>
            </div>
        </div>

        <!-- User Message -->
        <div class="user-query-container">
            <div class="visually-hidden">You said</div>
            <div class="query-text">
                <p></p>
                <p>Give me a short history about it.</p>
            </div>
        </div>

    </div>
</body>

</html>
